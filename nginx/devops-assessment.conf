# Rate limiting zone for api2
limit_req_zone $binary_remote_addr zone=api2_limit:10m rate=5r/m;

server {
    listen 80;
    server_name 13.233.55.244;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 13.233.55.244;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Root for React static files
    root /home/ubuntu/devops-assignment/frontend/build;
    index index.html;

    # Static file caching for JS/CSS/images
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # Health endpoint
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Public API1
    location /api1 {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Internal only API2 - blocked from external access
    location /api2 {
        allow 127.0.0.1;
        deny all;

        limit_req zone=api2_limit burst=5 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React app - serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
